<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeClaw</title>
  <link rel="stylesheet" href="/css-base/app.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-mono, monospace);
      background: var(--color-bg, #0d1117);
      color: var(--color-text, #c9d1d9);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      padding: 10px 20px;
      background: var(--color-surface, #161b22);
      border-bottom: 1px solid var(--color-border, #30363d);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 16px;
    }
    header h1 {
      font-size: 13px;
      color: var(--color-primary, #58a6ff);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .status-bar { display: flex; gap: 16px; font-size: 11px; }
    .status-item { display: flex; align-items: center; gap: 6px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-muted, #8b949e); flex-shrink: 0; }
    .dot.ok   { background: var(--color-success, #3fb950); }
    .dot.fail { background: var(--color-danger, #f85149); }

    /* ── App layout ── */
    .app { flex: 1; display: flex; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--color-surface, #161b22);
      border-right: 1px solid var(--color-border, #30363d);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-title {
      padding: 10px 14px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--color-muted, #8b949e);
      border-bottom: 1px solid var(--color-border, #30363d);
      flex-shrink: 0;
    }
    .project-list { flex: 1; overflow-y: auto; padding: 6px; }
    .project-item {
      padding: 9px 10px;
      margin-bottom: 2px;
      border-radius: 5px;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: background 0.12s;
    }
    .project-item:hover { background: rgba(88,166,255,0.06); }
    .project-item.active {
      background: rgba(88,166,255,0.1);
      border-left-color: var(--color-primary, #58a6ff);
    }
    .project-item .name {
      font-size: 12px; font-weight: 600;
      color: var(--color-text, #c9d1d9);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .project-item.active .name { color: var(--color-primary, #58a6ff); }
    .project-item .path {
      font-size: 10px; color: var(--color-muted, #8b949e);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }
    .project-item .del {
      display: none; float: right;
      background: none; border: none; cursor: pointer;
      color: var(--color-muted, #8b949e); font-size: 12px; padding: 0 2px;
    }
    .project-item:hover .del { display: inline; }
    .project-item .del:hover { color: var(--color-danger, #f85149); }

    .empty { font-size: 11px; color: var(--color-muted, #8b949e); text-align: center; padding: 20px 8px; }

    /* ── Add form ── */
    .add-form {
      flex-shrink: 0; padding: 10px;
      border-top: 1px solid var(--color-border, #30363d);
    }
    .add-form input {
      width: 100%; padding: 6px 9px; margin-bottom: 5px;
      background: var(--color-bg, #0d1117);
      border: 1px solid var(--color-border, #30363d);
      border-radius: 4px;
      color: var(--color-text, #c9d1d9);
      font-size: 11px; font-family: inherit;
    }
    .add-form input::placeholder { color: var(--color-muted, #8b949e); }
    .add-form input:focus { outline: none; border-color: var(--color-primary, #58a6ff); }
    .add-form button {
      width: 100%; padding: 6px;
      background: var(--color-primary, #58a6ff); color: #0d1117;
      border: none; border-radius: 4px;
      font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .add-form button:hover { background: var(--color-primary-hover, #79c0ff); }

    /* ── Main zone ── */
    .main {
      flex: 1; display: flex; overflow: hidden;
      background: var(--color-bg, #0d1117);
    }

    /* ── No project placeholder ── */
    .no-project {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--color-muted, #8b949e); font-size: 13px;
    }
    .no-project .icon { font-size: 32px; opacity: 0.4; }

    /* ── Project space (2 columns) ── */
    .project-space {
      flex: 1; display: none; overflow: hidden;
    }
    .project-space.visible { display: flex; }

    /* Left — TUI zone */
    .tui-zone {
      flex: 1; display: flex; flex-direction: column;
      border-right: 1px solid var(--color-border, #30363d);
      overflow: hidden;
    }
    .tui-header {
      padding: 8px 14px;
      background: var(--color-surface, #161b22);
      border-bottom: 1px solid var(--color-border, #30363d);
      font-size: 11px; color: var(--color-muted, #8b949e);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .tui-header .project-label { font-weight: 600; color: var(--color-text, #c9d1d9); }
    .tui-header .session-id { font-size: 10px; opacity: 0.6; }

    /* Right — Info zone */
    .info-zone {
      width: 280px; flex-shrink: 0;
      background: var(--color-surface, #161b22);
      border-left: 1px solid var(--color-border, #30363d);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .info-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--color-border, #30363d);
      flex-shrink: 0;
    }
    .info-project-name {
      font-size: 13px; font-weight: 700;
      color: var(--color-text, #c9d1d9);
      margin-bottom: 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .info-project-path {
      font-size: 10px; color: var(--color-muted, #8b949e);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 8px;
    }
    .info-status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px; border-radius: 10px;
      font-size: 10px; font-weight: 600; text-transform: uppercase;
    }
    .info-status-badge.active {
      background: rgba(63,185,80,0.15); color: var(--color-success, #3fb950);
    }
    .info-status-badge.running {
      background: rgba(210,153,34,0.15); color: #d29922;
    }
    .info-status-badge.error {
      background: rgba(248,81,73,0.15); color: var(--color-danger, #f85149);
    }
    .info-content {
      flex: 1; overflow-y: auto; padding: 12px 14px;
    }
    .info-section { margin-bottom: 16px; }
    .info-section-title {
      font-size: 10px; font-weight: 700;
      color: var(--color-muted, #8b949e);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .info-empty {
      font-size: 11px; color: var(--color-muted, #8b949e);
      text-align: center; padding: 20px 0;
    }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .stat-card {
      background: var(--color-bg, #0d1117);
      border: 1px solid var(--color-border, #30363d);
      border-radius: 5px; padding: 7px 9px;
    }
    .stat-value { font-size: 18px; font-weight: 700; color: var(--color-text, #c9d1d9); }
    .stat-label { font-size: 10px; color: var(--color-muted, #8b949e); margin-top: 2px; }
    .stat-card.success .stat-value { color: var(--color-success, #3fb950); }
    .stat-card.error   .stat-value { color: var(--color-danger, #f85149); }

    .exec-item {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 0; border-bottom: 1px solid var(--color-border, #30363d);
      font-size: 11px;
    }
    .exec-item:last-child { border-bottom: none; }
    .exec-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .exec-dot.success { background: var(--color-success, #3fb950); }
    .exec-dot.error   { background: var(--color-danger, #f85149); }
    .exec-time { color: var(--color-muted, #8b949e); font-size: 10px; margin-left: auto; }
    /* ── TUI messages ── */
    .tui-messages {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .tui-empty { font-size: 11px; color: var(--color-muted, #8b949e); text-align: center; margin-top: 20px; }
    .msg { max-width: 85%; padding: 8px 12px; border-radius: 6px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; background: rgba(88,166,255,0.15); border: 1px solid rgba(88,166,255,0.3); color: var(--color-text, #c9d1d9); }
    .msg.assistant { align-self: flex-start; background: var(--color-surface, #161b22); border: 1px solid var(--color-border, #30363d); color: var(--color-text, #c9d1d9); }
    .msg.system { align-self: center; font-size: 10px; color: var(--color-muted, #8b949e); background: none; border: none; padding: 2px 0; }
    .msg-typing { align-self: flex-start; color: var(--color-muted, #8b949e); font-size: 11px; padding: 4px 0; }

    /* ── TUI input ── */
    .tui-input-bar {
      flex-shrink: 0; display: flex; gap: 8px; padding: 10px 12px;
      border-top: 1px solid var(--color-border, #30363d);
      background: var(--color-surface, #161b22);
      align-items: flex-end;
    }
    .tui-textarea {
      flex: 1; padding: 8px 10px; resize: none;
      background: var(--color-bg, #0d1117);
      border: 1px solid var(--color-border, #30363d);
      border-radius: 6px; color: var(--color-text, #c9d1d9);
      font-size: 12px; font-family: inherit; line-height: 1.4;
    }
    .tui-textarea:focus { outline: none; border-color: var(--color-primary, #58a6ff); }
    .tui-send-btn {
      padding: 8px 14px; background: var(--color-primary, #58a6ff);
      color: #0d1117; border: none; border-radius: 6px;
      font-size: 14px; font-weight: 700; cursor: pointer; flex-shrink: 0;
    }
    .tui-send-btn:disabled { opacity: 0.4; cursor: default; }
    .tui-send-btn:hover:not(:disabled) { background: var(--color-primary-hover, #79c0ff); }

    .tui-controls { display: flex; gap: 6px; align-items: center; }
    .tui-ctrl-btn {
      background: none; border: 1px solid var(--color-border, #30363d);
      border-radius: 4px; color: var(--color-muted, #8b949e);
      font-size: 10px; padding: 2px 7px; cursor: pointer;
    }
    .tui-ctrl-btn:hover { border-color: var(--color-primary, #58a6ff); color: var(--color-text, #c9d1d9); }
    .tui-ctrl-btn.active { border-color: var(--color-primary, #58a6ff); color: var(--color-primary, #58a6ff); }
    .tui-conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-muted, #8b949e); flex-shrink: 0; }
    .tui-conn-dot.ok   { background: var(--color-success, #3fb950); }
    .tui-conn-dot.fail { background: var(--color-danger, #f85149); }
    .tui-header-left { display: flex; align-items: center; gap: 8px; }
    .info-actions {
      flex-shrink: 0; padding: 8px 14px;
      border-bottom: 1px solid var(--color-border, #30363d);
    }
    .run-btn {
      width: 100%; padding: 6px; font-size: 11px; font-weight: 600;
      background: rgba(63,185,80,0.15); color: var(--color-success, #3fb950);
      border: 1px solid rgba(63,185,80,0.3); border-radius: 4px; cursor: pointer;
    }
    .run-btn:hover:not(:disabled) { background: rgba(63,185,80,0.25); }
    .run-btn:disabled { opacity: 0.4; cursor: default; }
    .run-btn.running { background: rgba(210,153,34,0.15); color: #d29922; border-color: rgba(210,153,34,0.3); }

    /* ── Spotlight ── */
    .spotlight-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: flex-start; justify-content: center; padding-top: 15vh;
    }
    .spotlight-overlay.visible { display: flex; }
    .spotlight-box {
      background: var(--color-surface, #161b22);
      border: 1px solid var(--color-border, #30363d);
      border-radius: 8px; width: 420px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .spotlight-input {
      width: 100%; padding: 12px 16px; font-size: 13px;
      background: transparent; border: none; border-bottom: 1px solid var(--color-border, #30363d);
      color: var(--color-text, #c9d1d9); font-family: inherit; outline: none;
    }
    .spotlight-results { max-height: 260px; overflow-y: auto; }
    .spotlight-item {
      padding: 9px 16px; cursor: pointer; font-size: 12px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .spotlight-item:hover, .spotlight-item.focused {
      background: rgba(88,166,255,0.1);
    }
    .spotlight-item .s-name { font-weight: 600; color: var(--color-text, #c9d1d9); }
    .spotlight-item .s-path { font-size: 10px; color: var(--color-muted, #8b949e); }
    .spotlight-empty { padding: 16px; font-size: 11px; color: var(--color-muted, #8b949e); text-align: center; }
  </style>
</head>
<body>

  <header>
    <h1>CodeClaw</h1>
    <div class="status-bar">
      <div class="status-item">
        <span class="dot" id="srv-dot"></span>
        <span id="srv-text">Serveur...</span>
      </div>
      <div class="status-item">
        <span class="dot" id="oc-dot"></span>
        <span id="oc-text">Opencode...</span>
      </div>
    </div>
  </header>

  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-title">Projets</div>
      <div class="project-list" id="project-list">
        <p class="empty">Aucun projet</p>
      </div>
      <div class="add-form">
        <input type="text" id="inp-name" placeholder="Nom">
        <input type="text" id="inp-path" placeholder="Chemin (D:\dev\projet)">
        <input type="text" id="inp-desc" placeholder="Description (optionnel)">
        <button type="button" id="add-btn">+ Ajouter</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">

      <div class="no-project" id="no-project">
        <span class="icon">⟨/⟩</span>
        <span>Sélectionne un projet</span>
      </div>

      <div class="project-space" id="project-space">

        <!-- TUI zone -->
        <div class="tui-zone" id="tui-zone">
          <div class="tui-header">
            <div class="tui-header-left">
              <span class="tui-conn-dot" id="tui-conn-dot"></span>
              <span class="project-label" id="tui-project-name">—</span>
              <span class="session-id" id="tui-session-id"></span>
            </div>
            <div class="tui-controls">
              <button type="button" class="tui-ctrl-btn active" id="tui-autoscroll-btn" title="Auto-scroll">↓</button>
              <button type="button" class="tui-ctrl-btn" id="tui-clear-btn" title="Effacer messages">✕ clear</button>
            </div>
          </div>
          <div class="tui-messages" id="tui-messages">
            <p class="tui-empty">Aucun message</p>
          </div>
          <div class="tui-input-bar">
            <textarea id="tui-input" class="tui-textarea" placeholder="Envoie un message à opencode…" rows="2"></textarea>
            <button type="button" id="tui-send" class="tui-send-btn">↑</button>
          </div>
        </div>

        <!-- Info zone -->
        <div class="info-zone" id="info-zone">
          <div class="info-header" id="info-header">
            <div class="info-project-name" id="info-project-name">—</div>
            <div class="info-project-path" id="info-project-path"></div>
            <span class="info-status-badge active" id="info-status-badge">Active</span>
          </div>
          <div class="info-actions">
            <button type="button" id="run-btn" class="run-btn" disabled>▶ Exécuter</button>
          </div>
          <div class="info-content" id="info-content">
            <p class="info-empty">Sélectionne un projet</p>
          </div>
        </div>

      </div>

    </main>
  </div>

  <!-- Spotlight overlay -->
  <div class="spotlight-overlay" id="spotlight">
    <div class="spotlight-box">
      <input type="text" class="spotlight-input" id="spotlight-input" placeholder="Chercher un projet…" autocomplete="off">
      <div class="spotlight-results" id="spotlight-results"></div>
    </div>
  </div>

  <script>
    const srvDot  = document.getElementById('srv-dot');
    const srvText = document.getElementById('srv-text');
    const ocDot   = document.getElementById('oc-dot');
    const ocText  = document.getElementById('oc-text');
    const list    = document.getElementById('project-list');
    const noProj  = document.getElementById('no-project');
    const space   = document.getElementById('project-space');
    const tuiName     = document.getElementById('tui-project-name');
    const tuiSess     = document.getElementById('tui-session-id');
    const tuiMessages = document.getElementById('tui-messages');
    const tuiInput    = document.getElementById('tui-input');
    const tuiSendBtn  = document.getElementById('tui-send');
    const infoZone         = document.getElementById('info-zone');
    const infoProjectName  = document.getElementById('info-project-name');
    const infoProjectPath  = document.getElementById('info-project-path');
    const infoStatusBadge  = document.getElementById('info-status-badge');
    const infoContent      = document.getElementById('info-content');
    const tuiConnDot       = document.getElementById('tui-conn-dot');
    const tuiAutoScrollBtn = document.getElementById('tui-autoscroll-btn');
    const tuiClearBtn      = document.getElementById('tui-clear-btn');
    const runBtn           = document.getElementById('run-btn');

    let activeId    = null;
    let sessionId   = null;
    let sseSource   = null;
    let autoScroll  = true;
    let allProjects = [];
    let spotlightFocus = -1;

    const spotlight      = document.getElementById('spotlight');
    const spotlightInput = document.getElementById('spotlight-input');
    const spotlightRes   = document.getElementById('spotlight-results');

    function openSpotlight() {
      spotlight.classList.add('visible');
      spotlightInput.value = '';
      spotlightFocus = -1;
      renderSpotlight('');
      spotlightInput.focus();
    }
    function closeSpotlight() { spotlight.classList.remove('visible'); }

    function renderSpotlight(q) {
      const filtered = q
        ? allProjects.filter(p => p.name.toLowerCase().includes(q.toLowerCase()) || p.path.toLowerCase().includes(q.toLowerCase()))
        : allProjects;
      if (!filtered.length) {
        spotlightRes.innerHTML = '<p class="spotlight-empty">Aucun projet</p>';
        return;
      }
      spotlightRes.innerHTML = filtered.map((p, i) => `
        <div class="spotlight-item${i === spotlightFocus ? ' focused' : ''}" data-id="${esc(p.id)}">
          <span class="s-name">${esc(p.name)}</span>
          <span class="s-path">${esc(p.path)}</span>
        </div>`).join('');
      spotlightRes.querySelectorAll('.spotlight-item').forEach(el => {
        el.addEventListener('click', () => {
          const p = allProjects.find(x => x.id === el.dataset.id);
          if (p) { closeSpotlight(); openProject(p); }
        });
      });
    }

    spotlightInput.addEventListener('input', () => { spotlightFocus = -1; renderSpotlight(spotlightInput.value); });

    spotlightInput.addEventListener('keydown', (e) => {
      const items = spotlightRes.querySelectorAll('.spotlight-item');
      if (e.key === 'ArrowDown') { e.preventDefault(); spotlightFocus = Math.min(spotlightFocus + 1, items.length - 1); renderSpotlight(spotlightInput.value); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); spotlightFocus = Math.max(spotlightFocus - 1, 0); renderSpotlight(spotlightInput.value); }
      else if (e.key === 'Enter') {
        const focused = spotlightRes.querySelector('.focused');
        if (focused) { const p = allProjects.find(x => x.id === focused.dataset.id); if (p) { closeSpotlight(); openProject(p); } }
      } else if (e.key === 'Escape') closeSpotlight();
    });

    spotlight.addEventListener('click', (e) => { if (e.target === spotlight) closeSpotlight(); });

    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSpotlight(); }
      if (e.key === 'Escape' && spotlight.classList.contains('visible')) closeSpotlight();
    });

    tuiAutoScrollBtn.addEventListener('click', () => {
      autoScroll = !autoScroll;
      tuiAutoScrollBtn.classList.toggle('active', autoScroll);
    });

    tuiClearBtn.addEventListener('click', () => {
      tuiMessages.innerHTML = '<p class="tui-empty">Messages effacés</p>';
    });

    runBtn.addEventListener('click', async () => {
      const pid = runBtn.dataset.projectId;
      if (!pid) return;
      runBtn.classList.add('running');
      runBtn.textContent = '⏳ En queue…';
      runBtn.disabled = true;
      try {
        const res = await fetch('/api/queue', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'add', projectId: pid })
        });
        if (res.ok) {
          await fetch('/api/queue/run', { method: 'POST' });
          runBtn.textContent = '✓ Lancé';
          setTimeout(() => {
            runBtn.classList.remove('running');
            runBtn.textContent = '▶ Exécuter';
            runBtn.disabled = false;
          }, 3000);
        } else {
          runBtn.textContent = '✕ Erreur';
          setTimeout(() => { runBtn.classList.remove('running'); runBtn.textContent = '▶ Exécuter'; runBtn.disabled = false; }, 2000);
        }
      } catch {
        runBtn.classList.remove('running');
        runBtn.textContent = '▶ Exécuter';
        runBtn.disabled = false;
      }
    });

    infoContent.addEventListener('click', (e) => {
      const item = e.target.closest('.session-item');
      if (!item) return;
      const sid = item.dataset.sessionId;
      if (sid && sid !== sessionId) {
        sessionId = sid;
        tuiSess.textContent = `#${sid.slice(0,8)}`;
        tuiMessages.innerHTML = '<p class="tui-empty">Chargement session…</p>';
        loadMessages(sid);
      }
    });

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Open project space ──
    async function openProject(project) {
      activeId = project.id;

      document.querySelectorAll('.project-item').forEach(n => n.classList.remove('active'));
      document.querySelector(`.project-item[data-id="${project.id}"]`)?.classList.add('active');

      tuiName.textContent = project.name;
      tuiSess.textContent = '';

      // Update info zone
      renderProjectInfo(project);

      noProj.style.display = 'none';
      space.classList.add('visible');

      // Reset TUI
      tuiMessages.innerHTML = '<p class="tui-empty">Connexion…</p>';
      tuiInput.value = '';
      if (sseSource) { sseSource.close(); sseSource = null; }

      // Reuse existing session or create new one
      try {
        let session = null;
        const listRes = await fetch(`/api/oc/sessions?directory=${encodeURIComponent(project.path)}`);
        if (listRes.ok) {
          const sessions = await listRes.json();
          if (Array.isArray(sessions) && sessions.length > 0) {
            session = sessions[0];
          }
        }
        if (!session) {
          const createRes = await fetch('/api/oc/sessions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ directory: project.path, title: project.name })
          });
          if (createRes.ok) session = await createRes.json();
        }
        if (session) {
          sessionId = session.id ?? null;
          tuiSess.textContent = sessionId ? `#${sessionId.slice(0,8)}` : '';
          tuiMessages.innerHTML = '<p class="tui-empty">Prêt — envoie un message</p>';
          if (sessionId) loadMessages(sessionId);
          startSSE();
        } else {
          tuiMessages.innerHTML = '<p class="tui-empty">Erreur connexion opencode</p>';
        }
      } catch (e) {
        console.error('session open:', e);
        tuiMessages.innerHTML = '<p class="tui-empty">Erreur connexion opencode</p>';
      }
    }

    // ── Load existing messages ──
    async function loadMessages(sid) {
      try {
        const res = await fetch(`/api/oc/sessions/${sid}/messages`);
        const msgs = await res.json();
        if (!Array.isArray(msgs) || !msgs.length) return;
        tuiMessages.innerHTML = '';
        msgs.forEach(m => appendMessage(m.info?.role ?? 'system', extractText(m.parts)));
        scrollMessages();
      } catch (e) { console.error('loadMessages:', e); }
    }

    function extractText(parts) {
      if (!Array.isArray(parts)) return '';
      return parts.map(p => p?.text ?? p?.content ?? '').filter(Boolean).join('');
    }

    // ── Append a message bubble ──
    function appendMessage(role, text) {
      if (!text) return;
      const empty = tuiMessages.querySelector('.tui-empty');
      if (empty) empty.remove();
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      tuiMessages.appendChild(div);
      scrollMessages();
    }

    function scrollMessages() {
      if (autoScroll) tuiMessages.scrollTop = tuiMessages.scrollHeight;
    }

    // ── Render project info in info zone ──
    function renderProjectInfo(project) {
      infoProjectName.textContent = project.name;
      infoProjectPath.textContent = project.path;
      infoProjectPath.title = project.path;
      const status = project.status || 'active';
      infoStatusBadge.className = `info-status-badge ${status}`;
      infoStatusBadge.textContent = status;
      runBtn.disabled = false;
      runBtn.dataset.projectId = project.id;
      infoContent.innerHTML = '<p class="info-empty">Chargement…</p>';
      loadInfoContent(project.id, project.path);
    }

    async function loadInfoContent(projectId, projectPath) {
      try {
        const [sumRes, execRes, sessRes] = await Promise.all([
          fetch(`/api/executions/summary`),
          fetch(`/api/executions?projectId=${encodeURIComponent(projectId)}&limit=5`),
          fetch(`/api/oc/sessions?directory=${encodeURIComponent(projectPath)}`),
        ]);
        const sum = sumRes.ok ? await sumRes.json() : null;
        const execData = execRes.ok ? await execRes.json() : null;
        const execs = execData?.executions ?? [];
        const sessions = (sessRes.ok ? await sessRes.json() : null) ?? [];

        const successRate = sum && sum.today > 0
          ? Math.round((sum.success / sum.today) * 100)
          : null;

        infoContent.innerHTML = `
          <div class="info-section">
            <div class="info-section-title">Aujourd'hui</div>
            <div class="stat-grid">
              <div class="stat-card">
                <div class="stat-value">${sum?.today ?? '—'}</div>
                <div class="stat-label">exécutions</div>
              </div>
              <div class="stat-card ${sum?.error ? 'error' : 'success'}">
                <div class="stat-value">${successRate !== null ? successRate + '%' : '—'}</div>
                <div class="stat-label">succès</div>
              </div>
            </div>
          </div>
          <div class="info-section">
            <div class="info-section-title">Sessions (${sessions.length})</div>
            ${sessions.length === 0
              ? '<p class="info-empty">Aucune session</p>'
              : sessions.map(s => `
                <div class="exec-item session-item" data-session-id="${esc(s.id)}" style="cursor:pointer">
                  <span class="exec-dot ${s.id === sessionId ? 'ok' : ''}"></span>
                  <span>${esc(s.title || s.id.slice(0,8))}</span>
                  <span class="exec-time">${s.id === sessionId ? 'active' : '#' + s.id.slice(0,6)}</span>
                </div>`).join('')
            }
          </div>
          <div class="info-section">
            <div class="info-section-title">Dernières exécutions</div>
            ${execs.length === 0
              ? '<p class="info-empty">Aucune exécution</p>'
              : execs.map(e => `
                <div class="exec-item">
                  <span class="exec-dot ${e.status}"></span>
                  <span>${esc(e.status)}</span>
                  ${e.duration ? `<span>${e.duration}ms</span>` : ''}
                  <span class="exec-time">${new Date(e.startedAt).toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'})}</span>
                </div>`).join('')
            }
          </div>`;
      } catch {
        infoContent.innerHTML = '<p class="info-empty">Données indisponibles</p>';
      }
    }

    // ── SSE stream ──
    function startSSE() {
      if (sseSource) sseSource.close();
      sseSource = new EventSource('/api/oc/events');
      sseSource.onmessage = (e) => {
        try {
          const evt = JSON.parse(e.data);
          handleSSEEvent(evt);
        } catch { /* ignore parse errors */ }
      };
      sseSource.onerror = () => {
        // opencode not running or disconnected — silent
      };
    }

    function handleSSEEvent(evt) {
      if (!sessionId) return;
      const type = evt?.type ?? '';
      const props = evt?.properties ?? {};
      // Only handle events for current session
      if (props.sessionID && props.sessionID !== sessionId) return;

      if (type === 'assistant' || type === 'message.assistant') {
        const text = props.text ?? props.content ?? extractText(props.parts);
        if (text) appendMessage('assistant', text);
      } else if (type === 'message.part.updated' || type === 'part') {
        const text = props.text ?? props.content ?? '';
        if (text) {
          // Update last assistant bubble or create new
          const last = tuiMessages.querySelector('.msg.assistant:last-child');
          if (last && last.dataset.streaming === '1') {
            last.textContent = text;
          } else {
            const div = document.createElement('div');
            div.className = 'msg assistant';
            div.dataset.streaming = '1';
            div.textContent = text;
            const empty = tuiMessages.querySelector('.tui-empty');
            if (empty) empty.remove();
            tuiMessages.appendChild(div);
          }
          scrollMessages();
        }
      } else if (type === 'session.idle' || type === 'message.completed') {
        // Mark last streaming bubble as done
        const streaming = tuiMessages.querySelector('[data-streaming="1"]');
        if (streaming) delete streaming.dataset.streaming;
        tuiSendBtn.disabled = false;
      }
    }

    // ── Send prompt ──
    async function sendPrompt() {
      const text = tuiInput.value.trim();
      if (!text || !sessionId) return;
      tuiInput.value = '';
      tuiSendBtn.disabled = true;
      appendMessage('user', text);
      try {
        await fetch(`/api/oc/sessions/${sessionId}/prompt`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ parts: [{ type: 'text', text }] })
        });
      } catch (e) {
        appendMessage('system', `Erreur: ${e.message}`);
        tuiSendBtn.disabled = false;
      }
    }

    tuiSendBtn.addEventListener('click', sendPrompt);
    tuiInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); }
    });

    // ── Render project list ──
    function renderProjects(projects) {
      if (!projects.length) {
        list.innerHTML = '<p class="empty">Aucun projet</p>';
        return;
      }
      list.innerHTML = projects.map(p => `
        <div class="project-item${activeId === p.id ? ' active' : ''}" data-id="${esc(p.id)}">
          <button class="del" onclick="deleteProject(event,'${esc(p.id)}')">✕</button>
          <div class="name">${esc(p.name)}</div>
          <div class="path">${esc(p.path)}</div>
        </div>
      `).join('');

      list.querySelectorAll('.project-item').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.target.classList.contains('del')) return;
          const p = projects.find(x => x.id === el.dataset.id);
          if (p) openProject(p);
        });
      });
    }

    async function loadProjects() {
      try {
        const res = await fetch('/api/projects');
        const data = await res.json();
        allProjects = data.projects || [];
        renderProjects(allProjects);
      } catch (e) { console.error(e); }
    }

    document.getElementById('add-btn').addEventListener('click', async () => {
      const name = document.getElementById('inp-name').value.trim();
      const path = document.getElementById('inp-path').value.trim();
      const desc = document.getElementById('inp-desc').value.trim();
      if (!name || !path) return;
      const res = await fetch('/api/projects', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, path, description: desc })
      });
      if (res.ok) {
        document.getElementById('inp-name').value = '';
        document.getElementById('inp-path').value = '';
        document.getElementById('inp-desc').value = '';
        loadProjects();
      }
    });

    async function deleteProject(e, id) {
      e.stopPropagation();
      await fetch(`/api/projects/${id}`, { method: 'DELETE' });
      if (activeId === id) {
        activeId = null;
        space.classList.remove('visible');
        noProj.style.display = 'flex';
      }
      loadProjects();
    }

    async function checkServer() {
      try {
        await fetch('/api/health');
        srvDot.className = 'dot ok'; srvText.textContent = 'Serveur OK';
      } catch {
        srvDot.className = 'dot fail'; srvText.textContent = 'Serveur hors ligne';
      }
    }

    async function checkOpencode() {
      try {
        await fetch('/api/oc/sessions');
        ocDot.className = 'dot ok'; ocText.textContent = 'Opencode OK';
        tuiConnDot.className = 'tui-conn-dot ok';
      } catch {
        ocDot.className = 'dot fail'; ocText.textContent = 'Opencode hors ligne';
        tuiConnDot.className = 'tui-conn-dot fail';
      }
    }

    checkServer();
    checkOpencode();
    loadProjects();
    setInterval(checkServer, 15000);
    setInterval(checkOpencode, 15000);
  </script>
</body>
</html>
